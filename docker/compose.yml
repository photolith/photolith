version: '3.8'

services:
  wsgi:
    build:
      context: ../
      dockerfile: docker/wsgi/Dockerfile
    volumes:
      - static:/srv/app/staticfiles
      - doc:/srv/app/doc/_build/html
      - db:/srv/app/db
      - media:/srv/app/media
      - ingest:/srv/app/ingest_root
    expose:
      - 8000
    env_file:
      - ./.env
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - static:/srv/app/staticfiles
      - doc:/srv/app/doc/_build/html
      - certs:/var/lib/dehydrated/certs
    ports:
      - 8443:443
      - 8080:80
    env_file:
      - ./.env
    depends_on:
      - wsgi
  ftpd:
    build:
      context: ./ftpd
      dockerfile: Dockerfile
    volumes:
      - ingest:/srv/app/ingest_root
      - certs:/var/lib/dehydrated/certs
    ports:
      - 8021:021
      - 21100-21110:21100-21110
    env_file:
      - ./.env
    depends_on:
      - wsgi
      - nginx

volumes:
  # Stores (letsencrypt) SSL certs for use by ftpd & nginx.
  certs:
  # The default SQLite database, if used.
  db:
  # Pre-generated static resources hosted directly by NGINX. See https://docs.djangoproject.com/en/4.2/howto/static-files/
  static:
  # Pre-generated documentation hosted directly by NGINX
  doc:
  # Storage area for uploaded assets. See photolith/media/views.py
  media:
  # Temporary holding area for FTP-uploaded images, regularly emptied. See docker/ftpd/entrypoint.sh
  ingest:
