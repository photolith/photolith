{% load i18n %}
{% load random_prefix %}
{% random_prefix 'ph-viewer' as idPrefix %}
<canvas class="image"></canvas>
<div class="dropdown">
  <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
    <!-- https://icons.getbootstrap.com/icons/magic/ -->
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-magic" viewBox="0 0 16 16">
      <path d="M9.5 2.672a.5.5 0 1 0 1 0V.843a.5.5 0 0 0-1 0v1.829Zm4.5.035A.5.5 0 0 0 13.293 2L12 3.293a.5.5 0 1 0 .707.707L14 2.707ZM7.293 4A.5.5 0 1 0 8 3.293L6.707 2A.5.5 0 0 0 6 2.707L7.293 4Zm-.621 2.5a.5.5 0 1 0 0-1H4.843a.5.5 0 1 0 0 1h1.829Zm8.485 0a.5.5 0 1 0 0-1h-1.829a.5.5 0 0 0 0 1h1.829ZM13.293 10A.5.5 0 1 0 14 9.293L12.707 8a.5.5 0 1 0-.707.707L13.293 10ZM9.5 11.157a.5.5 0 0 0 1 0V9.328a.5.5 0 0 0-1 0v1.829Zm1.854-5.097a.5.5 0 0 0 0-.706l-.708-.708a.5.5 0 0 0-.707 0L8.646 5.94a.5.5 0 0 0 0 .707l.708.708a.5.5 0 0 0 .707 0l1.293-1.293Zm-3 3a.5.5 0 0 0 0-.706l-.708-.708a.5.5 0 0 0-.707 0L.646 13.94a.5.5 0 0 0 0 .707l.708.708a.5.5 0 0 0 .707 0L8.354 9.06Z"/>
    </svg>
  </button>
  <div class="dropdown-menu">
    <form class="px-1">
      <div>
        <label for="{{ idPrefix }}-brightness-input">{% translate 'Brightness' %}:</label>
        <input type="range" name="brightness" class="form-range" id="{{ idPrefix }}-brightness-input" min="-1" max="1" value="0" step="0.01" />
      </div>
      <div>
        <label for="{{ idPrefix }}-contrast-input">{% translate 'Contrast' %}:</label>
        <input type="range" name="contrast" class="form-range" id="{{ idPrefix }}-contrast-input" min="-1" max="1" value="0" step="0.01" />
      </div>
      <div>
        <label for="{{ idPrefix }}-gamma-input">{% translate 'Gamma' %}:</label>
        <input type="range" name="gamma" class="form-range" id="{{ idPrefix }}-gamma-input" min="0.01" max="2.2" value="1" step="0.01" />
      </div>
      <div class="text-end px-1">
        <a href="#" class="download-link btn btn-sm btn-secondary" title="{% translate 'Download original image' %}">
          <!-- https://icons.getbootstrap.com/icons/download/ -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-download" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
          </svg>
        </a>
        <input type="reset" class="btn btn-sm btn-secondary" value="{% translate 'Reset' %}" />
      </div>
    </form>
  </div>
</div>
