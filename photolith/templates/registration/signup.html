{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}
<div class="card bg-light bg-gradient">
  <div class="card-body">
    <h4 class="card-title">{{ title }}</h4>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      {{ form|crispy }}

      <button type="submit" class="btn btn-info btn-block">{% translate 'Sign up' %}</button>
    </form>
  </div>
</div>
{% endblock %}
