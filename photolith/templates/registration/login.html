{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h4 class="card-title">{% translate 'Log in to your account' %}</h4>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      {{ form|crispy }}

      <button type="submit" class="btn btn-primary btn-block">{% translate 'Log in' %}</button>
      <a href="/accounts/password_reset/" class="btn btn-secondary btn-block">{% translate 'Forgot Password?' %}</a>
    </form>
  </div>
</div>
{% endblock %}
