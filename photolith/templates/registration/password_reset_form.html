{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}
<div class="card bg-light bg-gradient">
  <div class="card-body">
    <h4 class="card-title">{{ title }}</h4>

    <p>{% translate 'Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.' %}</p>

    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}

      <button type="submit" class="btn btn-info btn-block">{% translate 'Reset my password' %}</button>
    </form>

  </div>
</div>
{% endblock %}
